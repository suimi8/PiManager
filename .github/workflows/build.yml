name: Build

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version label (e.g. 1.7.1)"
        required: true
        default: "1.7.1"
      upload_to_release:
        description: "Existing GitHub Release tag to upload into (e.g. v1.7.1). Leave empty for artifacts only."
        required: false
        default: ""
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows
          - os: macos-latest
            platform: macos
          - os: ubuntu-22.04
            platform: linux

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Linux GUI / smoke deps
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            xvfb \
            libgl1 \
            libegl1 \
            libglib2.0-0 \
            libxkbcommon0 \
            libxkbcommon-x11-0 \
            libdbus-1-3 \
            libxcb-cursor0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-shape0 \
            libxcb-xinerama0 \
            libxcb-xfixes0 \
            libfontconfig1 \
            libfreetype6 \
            libnss3 \
            libxcomposite1 \
            libxdamage1 \
            libxrandr2 \
            libxi6

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Build macOS icon (.icns)
        if: matrix.platform == 'macos'
        run: bash scripts/make_icns.sh

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          elif [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=1.7.1" >> "$GITHUB_OUTPUT"
          fi

      - name: PyInstaller (directory / app)
        run: python -m PyInstaller --noconfirm --clean PiManager.spec

      - name: PyInstaller (onefile, Windows only)
        if: matrix.platform == 'windows'
        run: python -m PyInstaller --noconfirm --clean PiManagerOneFile.spec

      - name: Smoke test packaged binary
        shell: bash
        run: |
          export QT_QPA_PLATFORM=offscreen
          python scripts/smoke_test_dist.py \
            --platform "${{ matrix.platform }}" \
            --dist dist \
            --expected-version "${{ steps.ver.outputs.version }}"

      - name: Package release archives
        shell: bash
        run: |
          python scripts/package_release.py \
            --platform "${{ matrix.platform }}" \
            --version "${{ steps.ver.outputs.version }}"
          ls -lah release-assets

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: PiManager-${{ matrix.platform }}-v${{ steps.ver.outputs.version }}
          path: release-assets/*
          if-no-files-found: error

      - name: Upload to GitHub Release
        if: >
          startsWith(github.ref, 'refs/tags/v') ||
          github.event.inputs.upload_to_release != ''
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
          else
            TAG="${{ github.event.inputs.upload_to_release }}"
          fi
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" --title "PiManager ${TAG}" --generate-notes
          fi
          # Upload archives only (skip plain text notes if desired, but notes are helpful)
          gh release upload "$TAG" release-assets/* --clobber

  package-vsix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Package Cursor extension
        working-directory: extensions/pi-cursor
        run: npm ci
      - name: Build Cursor extension package
        run: |
          python scripts/package_extension.py --out release-assets
      - uses: actions/upload-artifact@v4
        with:
          name: PiManager-vsix
          path: release-assets/*.vsix
          if-no-files-found: error
      - name: Upload VSIX to GitHub Release
        if: >
          startsWith(github.ref, 'refs/tags/v') ||
          github.event.inputs.upload_to_release != ''
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
          else
            TAG="${{ github.event.inputs.upload_to_release }}"
          fi
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" --title "PiManager ${TAG}" --generate-notes
          fi
          gh release upload "$TAG" release-assets/*.vsix --clobber
